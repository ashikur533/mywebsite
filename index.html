<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>WhatsApp Tour Extractor</title>

<style>
body{
    font-family: Arial;
    background:#f2f4f7;
}
.container{
    width:95%;
    margin:20px auto;
    background:#fff;
    padding:20px;
    box-shadow:0 0 10px #ccc;
}
textarea{
    width:100%;
    height:180px;
    padding:10px;
    font-size:14px;
}
button{
    padding:8px 15px;
    background:#0066cc;
    color:#fff;
    border:none;
    cursor:pointer;
    margin:5px;
}
button:hover{ background:#004999; }

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #aaa;
    padding:6px;
    font-size:13px;
}
th{ background:#e9eef3; }
td[contenteditable]{ background:#fffbe6; }
</style>
</head>

<body>

<div class="container">

<h2>📩 WhatsApp Tour Plan Extractor</h2>

<textarea id="wa_sms" placeholder="Paste WhatsApp Chat..."></textarea><br>

<button onclick="addWA()">➕ Extract</button>
<button onclick="exportTable('waTable','report.csv')">📊 Export</button>

<table id="waTable">
<thead>
<tr>
<th>SL</th>
<th>Name / Number</th>
<th>Time</th>
<th>AM/PM</th>
<th>Type</th>
<th>EMP ID</th>
<th>Name</th>
<th>Monthly Tour</th>
<th>Today Tour</th>
</tr>
</thead>
<tbody></tbody>
</table>

</div>

<script>
let sl = 1;

/* CLEAN TIME */
function cleanTime(raw){
    raw = raw.replace(/[^0-9:apm\s]/gi,'').trim();
    let p = raw.split(/\s+/);
    return {
        time: p[0] || "",
        ampm: (p[1] || "").toUpperCase()
    };
}

/* ADD ROW */
function addRow(sender,time,ampm,type,emp,name,monthly,today){

    let row = `<tr>
        <td>${sl++}</td>
        <td contenteditable>${sender}</td>
        <td contenteditable>${time}</td>
        <td contenteditable>${ampm}</td>
        <td contenteditable>${type}</td>
        <td contenteditable>${emp}</td>
        <td contenteditable>${name}</td>
        <td contenteditable>${monthly}</td>
        <td contenteditable>${today}</td>
    </tr>`;

    waTable.querySelector("tbody").insertAdjacentHTML("beforeend",row);
}

/* MAIN PARSER */
function addWA(){

    let text = wa_sms.value;
    let lines = text.split("\n");

    let regex = /^(\d{2}\/\d{2}\/\d{2}),\s([\d:]+[^-]*)\s-\s(.+?):\s?(.*)$/i;

    for(let i=0;i<lines.length;i++){

        let line = lines[i];
        let m = line.match(regex);
        if(!m) continue;

        let t = cleanTime(m[2]);
        let sender = m[3];
        let msg = m[4].trim();

        let type="normal";
        let emp="";
        let name="";
        let monthly="";
        let today="";

        /* MEDIA */
        if(msg.includes("<Media omitted>")){
            type="media";
            addRow(sender,t.time,t.ampm,type,emp,name,monthly,today);
            continue;
        }

        /* LOCATION */
        if(msg.toLowerCase().includes("location") || msg.includes("maps.google")){
            type="map";
            addRow(sender,t.time,t.ampm,type,emp,name,monthly,today);
            continue;
        }

        /* TOUR BLOCK */
        if(msg.toLowerCase().includes("tour")){

            let block = msg;
            let j = i+1;

            while(j<lines.length && !lines[j].match(regex)){
                block += "\n"+lines[j];
                j++;
            }

            i = j-1;

            type="tour plan";

            /* EMP ID */
            let empMatch = block.match(/emp\s*id[:\s\-]*([0-9]+)/i);
            if(empMatch) emp = empMatch[1];

            /* NAME */
            let nameMatch = block.match(/name[:\s\-]*(.*)/i);
            if(nameMatch) name = nameMatch[1].split("\n")[0].trim();

            /* MONTHLY TOUR */
            let mon = block.match(/monthly\s*.*tour.*[:\-]\s*(.*)/i);
            if(mon) monthly = mon[1].trim();

            /* TODAY TOUR */
            let tod = block.match(/today\s*.*tour.*[:\-]\s*(.*)/i);
            if(tod) today = tod[1].trim();

            addRow(sender,t.time,t.ampm,type,emp,name,monthly,today);
            continue;
        }

        /* NORMAL */
        addRow(sender,t.time,t.ampm,type,emp,name,monthly,today);
    }

    wa_sms.value="";
}

/* EXPORT CSV */
function exportTable(id,file){
    let csv="";
    document.querySelectorAll("#"+id+" tr").forEach(tr=>{
        let row=[];
        tr.querySelectorAll("th,td").forEach(td=>{
            row.push(`"${td.innerText.replace(/"/g,'""')}"`);
        });
        csv+=row.join(",")+"\n";
    });

    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv]));
    a.download=file;
    a.click();
}
</script>

</body>
</html>
