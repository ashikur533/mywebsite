<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Data Collector – Ultimate Final</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f4f7;
}
.container{
    width:95%;
    margin:20px auto;
    background:#fff;
    padding:20px;
    box-shadow:0 0 10px #ccc;
}
textarea{
    width:100%;
    height:180px;
    padding:10px;
    font-size:14px;
}
button{
    padding:8px 15px;
    background:#0066cc;
    color:#fff;
    border:none;
    cursor:pointer;
    margin:5px 5px 5px 0;
}
button:hover{ background:#004999; }

.menu button{
    background:#333;
}
.menu button:hover{
    background:#000;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #aaa;
    padding:6px;
    font-size:13px;
}
th{ background:#e9eef3; }
td[contenteditable]{ background:#fffbe6; }

.section{ display:none; }
</style>
</head>

<body>

<div class="container">
<h2>📩 SMS Data Collector (Ultimate Final)</h2>

<div class="menu">
<button onclick="show('manual')">Manual Headline</button>
<button onclick="show('wa')">WhatsApp Extract</button>
</div>

<!-- ================= WHATSAPP ================= -->
<div id="wa" class="section" style="display:block;">
<h3>WhatsApp Extract</h3>

<textarea id="wa_sms" placeholder="Paste full WhatsApp chat..."></textarea><br>

<button onclick="addWA()">➕ Add</button>
<button onclick="exportTable('waTable','WhatsApp_Report.csv')">📊 Export</button>

<table id="waTable">
<thead>
<tr>
<th>SL</th>
<th>Name / Number</th>
<th>Time</th>
<th>AM/PM</th>
<th>Type</th>
<th>EMP ID</th>
<th>Monthly Tour</th>
<th>Today Tour</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
let sl2 = 1;

/* SHOW */
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.style.display='none');
    document.getElementById(id).style.display='block';
}

/* ================= WHATSAPP ================= */
function addWA(){

    let text = wa_sms.value;
    let lines = text.split("\n");

    let headerRegex = /^(\d{2}\/\d{2}\/\d{2}),\s([\d:]+[^-]*)\s-\s(.+?):\s?(.*)$/i;

    for(let i=0; i<lines.length; i++){

        let line = lines[i];
        let m = line.match(headerRegex);

        if(!m) continue;

        let rawTime = m[2];

        // ✅ CLEAN TIME (fix â€¯ issue)
        rawTime = rawTime.replace(/[^0-9:apm\s]/gi, '').trim();

        let parts = rawTime.split(/\s+/);
        let timeOnly = parts[0] || "";
        let ampm = (parts[1] || "").toUpperCase();

        let sender = m[3];
        let msg = m[4].trim();

        let type = "normal";
        let emp = "";
        let monthly = "";
        let today = "";

        // MEDIA
        if(msg.includes("<Media omitted>")){
            type = "media";
            addRow(sender, timeOnly, ampm, type, emp, monthly, today);
            continue;
        }

        // MAP
        if(msg.toLowerCase().includes("maps.google.com") || msg.toLowerCase().includes("location")){
            type = "map";
            addRow(sender, timeOnly, ampm, type, emp, monthly, today);
            continue;
        }

        // TOUR PLAN
        if(msg.toLowerCase().includes("tour plan")){

            let j = i + 1;
            let block = msg;

            while(j < lines.length && !lines[j].match(headerRegex)){
                block += "\n" + lines[j];
                j++;
            }

            i = j - 1;

            type = "tour plan";

            // EMP ID
            let empMatch = block.match(/emp\s*id[:\s\-]*([0-9]+)/i);
            if(empMatch) emp = empMatch[1];

            // Monthly Tour
            let monMatch = block.match(/monthly\s.*tour.*[:\-]\s*(.*)/i);
            if(monMatch) monthly = monMatch[1].replace(/[()]/g,"").trim();

            // Today Tour (fixed)
            let todayMatch = block.match(/today\s.*tour.*[:\-]\s*(.*)/i);
            if(todayMatch) today = todayMatch[1].replace(/[()]/g,"").trim();

            addRow(sender, timeOnly, ampm, type, emp, monthly, today);
            continue;
        }

        // NORMAL
        addRow(sender, timeOnly, ampm, type, emp, monthly, today);
    }

    wa_sms.value = "";
}

/* ADD ROW */
function addRow(name, time, ampm, type, emp, monthly, today){
    let row = `<tr>
        <td>${sl2++}</td>
        <td contenteditable>${name}</td>
        <td contenteditable>${time}</td>
        <td contenteditable>${ampm}</td>
        <td contenteditable>${type}</td>
        <td contenteditable>${emp}</td>
        <td contenteditable>${monthly}</td>
        <td contenteditable>${today}</td>
    </tr>`;

    waTable.querySelector("tbody").insertAdjacentHTML("beforeend", row);
}

/* EXPORT CSV */
function exportTable(id,file){
    let csv = "";
    document.querySelectorAll("#"+id+" tr").forEach(tr=>{
        let r = [];
        tr.querySelectorAll("th,td").forEach(td=>{
            r.push(`"${td.innerText.replace(/"/g,'""')}"`);
        });
        csv += r.join(",") + "\n";
    });

    let a = document.createElement("a");
    a.href = URL.createObjectURL(new Blob([csv]));
    a.download = file;
    a.click();
}
</script>

</body>
</html>
