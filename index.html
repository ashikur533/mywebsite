<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>SMS Data Collector – Simplified</title>

<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f4f7;
}
.container{
    width:95%;
    margin:20px auto;
    background:#fff;
    padding:20px;
    box-shadow:0 0 10px #ccc;
}
textarea{
    width:100%;
    height:160px;
    padding:10px;
    font-size:14px;
}
button{
    padding:8px 15px;
    background:#0066cc;
    color:#fff;
    border:none;
    cursor:pointer;
    margin:5px 5px 5px 0;
}
button:hover{ background:#004999; }

.menu button{
    background:#333;
}
.menu button:hover{
    background:#000;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}
th,td{
    border:1px solid #aaa;
    padding:6px;
    font-size:13px;
}
th{ background:#e9eef3; }
td[contenteditable]{ background:#fffbe6; }

.section{ display:none; }
</style>
</head>

<body>

<div class="container">
<h2>📩 SMS Data Collector (Simplified)</h2>

<div class="menu">
<button onclick="show('manual')">Manual Headline</button>
<button onclick="show('wa')">WhatsApp Extract</button>
</div>

<!-- ================= MANUAL ================= -->
<div id="manual" class="section">
<h3>Manual Headline</h3>

<b>✍️ Headline (one per line)</b>
<textarea id="manual_head">Date
Name
Designation
Area
Remarks</textarea>

<b>📩 Paste SMS</b>
<textarea id="manual_sms"></textarea><br>

<button onclick="addManual()">➕ Add</button>
<button onclick="exportTable('manualTable','Manual_Report.csv')">📊 Export</button>

<table id="manualTable">
<thead><tr id="manualHeadRow"><th>SL</th></tr></thead>
<tbody></tbody>
</table>
</div>

<!-- ================= WHATSAPP ================= -->
<div id="wa" class="section">
<h3>WhatsApp Extract</h3>

<textarea id="wa_sms" placeholder="Paste WhatsApp Chat..."></textarea><br>

<button onclick="addWA()">➕ Add</button>
<button onclick="exportTable('waTable','WhatsApp_Report.csv')">📊 Export</button>

<table id="waTable">
<thead>
<tr>
<th>SL</th>
<th>Name / Number</th>
<th>Type</th>
<th>Time</th>
</tr>
</thead>
<tbody></tbody>
</table>
</div>

</div>

<script>
let sl1=1, sl2=1;

/* SHOW SECTION */
function show(id){
    document.querySelectorAll('.section').forEach(s=>s.style.display='none');
    document.getElementById(id).style.display='block';
}

/* FIND VALUE */
function find(text,key){
    let r=new RegExp(key+"\\s*[:\\-]?\\s*(.*)","i");
    let m=text.match(r);
    return m?m[1].trim():"";
}

/* MANUAL */
function addManual(){
    let heads=manual_head.value.split("\n").filter(h=>h);
    let sms=manual_sms.value;

    let headRow=document.getElementById("manualHeadRow");
    headRow.innerHTML="<th>SL</th>";
    heads.forEach(h=>headRow.innerHTML+=`<th>${h}</th>`);

    let row=`<tr><td>${sl1++}</td>`;
    heads.forEach(h=>row+=`<td contenteditable>${find(sms,h)}</td>`);
    row+="</tr>";

    manualTable.querySelector("tbody").insertAdjacentHTML("beforeend",row);
    manual_sms.value="";
}

/* TYPE DETECT */
function detectType(line){
    let l=line.toLowerCase();
    if(l.includes("maps.google.com")) return "map";
    else if(l.includes("tour plan")) return "tour plan";
    else return "normal";
}

/* WHATSAPP EXTRACT */
function addWA(){
    let text=wa_sms.value;
    let lines=text.split("\n");

    let regex=/\[(\d{1,2}:\d{2})\s?[APMapm]{2},.*?\]\s(.+?):/;

    lines.forEach(line=>{
        let m=line.match(regex);
        if(m){
            let time=m[1];
            let name=m[2];
            let type=detectType(line);

            let row=`<tr>
            <td>${sl2++}</td>
            <td contenteditable>${name}</td>
            <td contenteditable>${type}</td>
            <td contenteditable>${time}</td>
            </tr>`;

            waTable.querySelector("tbody").insertAdjacentHTML("beforeend",row);
        }
    });

    wa_sms.value="";
}

/* EXPORT CSV */
function exportTable(id,file){
    let csv="";
    document.querySelectorAll("#"+id+" tr").forEach(tr=>{
        let r=[];
        tr.querySelectorAll("th,td").forEach(td=>{
            r.push(`"${td.innerText.replace(/"/g,'""')}"`);
        });
        csv+=r.join(",")+"\n";
    });

    let a=document.createElement("a");
    a.href=URL.createObjectURL(new Blob([csv]));
    a.download=file;
    a.click();
}
</script>

</body>
</html>
